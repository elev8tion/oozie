{{define "partials/publishing/list"}}
{{if .Flash}}<div class="notice good">{{.Flash}}</div>{{end}}
<div class="panel table-panel">
{{with index .Data "Jobs"}}
<table><thead><tr><th>ID</th><th>Project</th><th>Status</th><th>Error</th><th>Updated</th></tr></thead><tbody>{{range .}}{{template "partials/publishing/row" dict "Data" (dict "Job" .)}}{{end}}</tbody></table>
{{else}}<div class="empty"><h2>No publishing jobs</h2><p>Publish a draft to create one.</p></div>{{end}}
</div>
{{end}}
