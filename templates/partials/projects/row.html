{{define "partials/projects/row"}}
{{$p := index .Data "Project"}}
<tr>
  <td><a class="strong" href="/projects/{{$p.ID}}">{{$p.Name}}</a></td>
  <td><span class="badge">{{$p.Status}}</span></td>
  <td class="muted">{{$p.ProjectPathDisplay}}</td>
  <td>{{if $p.Trusted}}<span class="badge good">trusted</span>{{else}}<span class="badge warn">confirm</span>{{end}}</td>
  <td class="row-actions"><a class="button small" href="/projects/{{$p.ID}}/agent">Agent</a><a class="button small" href="/projects/{{$p.ID}}/publish">Publish</a><form hx-post="/projects/{{$p.ID}}/archive" hx-target="#project-list" hx-confirm="Archive {{$p.Name}}?"><button class="button danger small">Archive</button></form></td>
</tr>
{{end}}
